{id:"prompting",label:"Prompting 101",group:"Start Here",emoji:"⭐",highlight:true,html:`
<div class="warn-banner" style="background:linear-gradient(135deg,#fef3c7,#fef9e7);border-color:var(--amber-bd)">
  <div class="warn-banner-title" style="color:var(--amber-txt);font-size:22px;font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:-.6px">⭐ Prompting 101</div>
  <p style="margin:0;color:var(--amber-txt);font-size:14.5px;line-height:1.7">Seven principles. If Claude ever gives you something generic, off-tone, or just wrong, the fix is almost always in one of these. Read all seven before you open any tool.</p>
</div>

<details class="acc" open>
  <summary><span>Principle 1. Vague input gets vague output</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>The biggest factor in Claude's output quality is how much context you give it. Look at the difference:</p>
    <div class="bad">❌ Write a blog post about college admissions.</div>
    <div class="good">✅ Write an 800-word blog post for parents of high school juniors about why starting the Common App in June (not August) leads to better essays. Include 3 specific things they can do this month. Tone: warm, like a knowledgeable friend. Not alarming.</div>
    <p>The second prompt specifies the audience, length, angle, what to include, and tone. That's the difference between getting a generic 5-paragraph essay and getting something you can actually use.</p>
    <p><strong>Every prompt should answer at least three of these:</strong></p>
    <ul>
      <li><strong>Who is this for?</strong>, "a parent who just found out about Common App" vs. "an admissions counselor"</li>
      <li><strong>What format?</strong>, email, bullet list, 150-character activity description, slide outline?</li>
      <li><strong>How long?</strong>, word count, character limit, number of items</li>
      <li><strong>What tone?</strong>, warm, direct, professional, reassuring?</li>
      <li><strong>What to include or avoid?</strong>, specific topics, constraints, things that are off-limits</li>
    </ul>
  </div>
</details>

<details class="acc">
  <summary><span>Principle 2. Tell Claude who you are</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>Claude doesn't know you're a Prepory counselor writing to a junior who just got a 1480 and is targeting Emory and Wake Forest. If you don't say that, it answers for a generic user asking a generic question.</p>
    <p>One sentence at the start of your prompt changes everything:</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm a college admissions counselor at Prepory. I'm working with a high school junior, strong stats, applying to schools like Georgetown, Emory, and Tufts, who is struggling to find an essay topic that doesn't feel cliché. Help me...</pre><button class="copy-btn" data-text="I'm a college admissions counselor at Prepory. I'm working with a high school junior, strong stats, applying to schools like Georgetown, Emory, and Tufts, who is struggling to find an essay topic that doesn't feel cliché. Help me...">Copy</button></div></div>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm on Prepory's sales team. I'm following up with a parent who attended our 'College Admissions 101' webinar last Tuesday but hasn't booked a consultation. Help me draft a follow-up email that...</pre><button class="copy-btn" data-text="I'm on Prepory's sales team. I'm following up with a parent who attended our 'College Admissions 101' webinar last Tuesday but hasn't booked a consultation. Help me draft a follow-up email that...">Copy</button></div></div>
    <p style="margin-top:12px"><strong>Pro tip:</strong> If you find yourself repeating the same context ("I'm a Prepory coach working with a Stanford applicant...") in every conversation, that's a signal to turn it into a <strong>Project</strong> (covered later in the guide). Projects hold that context automatically so you never have to re-type it.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Principle 3. Give Claude a role to play</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>Just like telling Claude who <em>you</em> are helps, telling Claude who to <em>be</em> shapes the output. Modern Claude doesn't need this as much as older models, but assigning a role still genuinely improves responses when you want a specific perspective, tone, or level of expertise.</p>
    <p>One sentence at the top of a prompt shifts the whole response:</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">You are a veteran Ivy League admissions officer. I'm sharing a student's supplemental essay draft. Give me the three sharpest pieces of feedback, the kind you'd flag in committee, not surface-level grammar notes.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">You are a senior brand strategist who's run marketing for education companies. Review this landing page copy and tell me what's weak, what's working, and what you'd test first.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">You are a skeptical parent who already has doubts about paying for college consulting. Read this follow-up email and tell me every reason you'd ignore it or unsubscribe.</pre><button class="copy-btn">Copy</button></div></div>
    <p><strong>Roles help most when you want:</strong></p>
    <ul>
      <li>A specific <strong>tone or voice</strong> ("Write like a warm older sibling, not a corporate brand.")</li>
      <li><strong>Domain expertise</strong> ("You're a financial aid officer who's reviewed thousands of appeals.")</li>
      <li>An <strong>adversarial read</strong> ("You're a critical admissions reader looking for reasons to reject.")</li>
    </ul>
    <p>Roles help less when the task is concrete and mechanical (summarize this, reformat as bullets, count the words). In those cases a persona just adds noise. And a role is not a substitute for context: pair it with the specifics from Principles 1 and 2.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Principle 4. Show it what 'good' looks like</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>Claude produces dramatically better output when you give it a reference before asking it to create something. This is the most underused technique in the guide.</p>
    <p><strong>The pattern: show the standard, then ask it to meet that standard.</strong></p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Here's a strong 'Why Stanford?' essay from our exemplars folder: [paste essay]. Here's a student's current draft: [paste draft]. Using the exemplar as a benchmark, what specific feedback would help this student close the gap?</pre><button class="copy-btn">Copy</button></div></div>
    <p>Without the exemplar, you get generic essay advice that could apply to anyone. With it, you get specific, calibrated feedback tied to what actually works for that prompt at that school.</p>
    <p>Where to find references:</p>
    <ul>
      <li>Strong student essays → <a href="${L.exemplars}" target="_blank" rel="noopener" class="ext-link">Exemplars Directory</a></li>
      <li>School-specific intel → <a href="${L.briefs}" target="_blank" rel="noopener" class="ext-link">Insider Briefs</a></li>
      <li>Prepory's approach → <a href="${L.curriculum}" target="_blank" rel="noopener" class="ext-link">Curriculum Guides</a></li>
      <li>Brand voice → paste existing Prepory copy you like into the conversation</li>
    </ul>
    <p>Even better: in <strong>Cowork</strong>, point Claude at the folder that holds your exemplars and it can read them itself. In <strong>Projects</strong>, upload them once and they're always available.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Principle 5. Ask for options, not one answer</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>Don't ask for one thing and go with it. Ask for several and pick the best, or combine elements from multiple options.</p>
    <div class="bad">❌ Write a subject line for this email.</div>
    <div class="good">✅ Write 5 subject line options. Mix: question-based, direct, curiosity-driven, stat-based. All under 55 characters. One should reference the August 1st Common App deadline.</div>
    <p>This applies to everything: essay topic angles, activity descriptions, email openers, social post hooks, slide titles. Options give you choices, and choices give you the best final product.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Principle 6. Iterate. Push back. Don't accept the first thing.</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>The first output is a draft. Your job is to shape it. Talk to Claude like a colleague helping you draft something. Give it specific feedback, not vague dissatisfaction.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">The tone is too formal. This is going to a parent, not a law firm. Make it warmer and more conversational.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">The second paragraph is vague. Rewrite it with a specific example, maybe a student who started counseling in junior year vs. one who waited until senior fall.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Good structure, but it's running too long. Cut it to under 180 words without losing the core message.</pre><button class="copy-btn">Copy</button></div></div>
    <p>Each follow-up gets you closer because Claude has more context about what you want. The best results usually come after 2–4 rounds of refinement. As long as you stay in the same chat, Claude remembers everything you've said, so you don't need to repeat yourself.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Principle 7. Always review before it goes anywhere</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>Non-negotiable. Claude can be confidently, fluently wrong. Every output needs a human read before it reaches a student, parent, client, or your social feed.</p>
    <p><strong>What to check:</strong></p>
    <ul>
      <li><strong>Accuracy</strong>. If there's a specific number or claim you didn't provide, verify it.</li>
      <li><strong>Tone</strong>. Does it sound like Prepory? Like you? Or like a generic AI assistant?</li>
      <li><strong>Inflation</strong>. Claude can overstate. "Led a team of cross-functional stakeholders" might mean "sent a Slack message to three people." Scale it to reality.</li>
      <li><strong>Filler phrases</strong>, "In today's competitive landscape," "a passion for making a difference." Cut these on sight.</li>
      <li><strong>Hallucinations</strong>. Claude occasionally invents programs, scholarships, or quotes. If something sounds suspiciously specific and you didn't provide it, look it up.</li>
    </ul>
    <div class="callout callout-tip"><span class="callout-icon">💡</span><span>Quick test: read it out loud. If any sentence could appear in any college admissions blog anywhere on the internet, it's too generic. Rewrite with one specific, true detail and it'll immediately be better.</span></div>
  </div>
</details>
`},

/* SEC_COWORK */
{id:"cowork",label:"Cowork",group:"Claude Essentials",emoji:"🧑‍💻",html:`
<div class="chapter-cover essentials">
  <div class="chapter-label"><span class="chapter-num">Part 02</span> Claude Essentials</div>
  <h2 class="chapter-title">The features that make Claude actually useful for Prepory.</h2>
  <p class="chapter-desc">Cowork, Chat, Skills, Connectors, Projects, and how to stay within usage limits. These are the building blocks, everything in the later chapters assumes you know what's in here.</p>
  <div class="chapter-meta">
    <span class="chapter-chip">🧑‍💻 Cowork</span>
    <span class="chapter-chip">💬 Chat</span>
    <span class="chapter-chip">🧠 Skills</span>
    <span class="chapter-chip">🔌 Connectors</span>
    <span class="chapter-chip">📁 Projects</span>
    <span class="chapter-chip">⚡ Usage limits</span>
  </div>
</div>
<h2 class="display">Cowork, the main way you'll use Claude.</h2>
<p>Cowork is Claude's desktop app experience, and it's where most of the real work at Prepory will happen. Unlike the browser, Cowork can read the files on your computer, write new files directly into a folder you choose (Word docs, slide decks, spreadsheets), talk to your connectors (Monday, Drive, Gmail, Calendar), use skills, and use projects, all in one place.</p>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span><strong>The shift from Chat to Cowork is the biggest unlock in this guide.</strong> Chat is great for quick questions, but Cowork is where Claude becomes a real teammate that can actually do things for you, like creating a full prep packet for a student, updating a Monday board after a session, or building a polished deck from your rough notes.</span></div>

<div class="sh">What Cowork can do that Chat can't</div>
<p>A lot of Claude features, skills, projects, and cloud connectors like Monday, Drive, Gmail, and Calendar, work in the browser too. What makes Cowork distinct is <strong>direct access to a folder on your computer</strong>. That single capability changes everything downstream.</p>
<div class="grid-cards">
  ${[['📂','Read a folder from your computer','Point Claude at a student\'s folder and it can read every file in there, session notes, drafts, activity lists, parent emails, and reason across all of them, without you dragging anything in. Chat in the browser can accept file uploads, but it can\'t read or write directly to a folder on your computer.'],['📄','Create real files into that folder','Claude can write .docx, .pptx, .xlsx, and .pdf files directly into your folder. These aren\'t copy-paste outputs, they\'re real, formatted, shareable documents you can open in Word, PowerPoint, Excel, etc.'],['🛠️','Run tools that live on your computer','Local extensions (MCP servers) that read local files, launch local apps, or control Claude in Chrome only run via the desktop app. The browser connects to cloud services; Cowork does both.'],['🧵','Keep everything in one place','Because Cowork combines folder access + skills + projects + connectors in one surface, you stop bouncing between tabs, downloads, and copy-paste. That integration is the real win, not any single feature.']].map(([e,t,d])=>`<div class="use-case-card" style="display:flex;gap:14px"><span style="font-size:18px">${e}</span><div><div style="font-weight:700;color:var(--ink);font-size:14px">${t}</div><div style="font-size:13px;color:var(--muted);margin-top:3px;line-height:1.6">${d}</div></div></div>`).join('')}
</div>

<div class="sh">Getting started with Cowork, step by step</div>
<p style="margin-top:-4px">Assuming you already installed the desktop app (Step 0 in the Welcome section), here's the rest:</p>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text"><strong>Open the desktop app and find the Cowork tab.</strong> Once you're signed in with your Prepory email, look for the <strong>Cowork</strong> option (the app has a mode selector with both Chat and Cowork). Click it to enter Cowork mode. If you don't see it, make sure you're fully signed in and on the latest version of the desktop app.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text"><strong>Select a folder to work in.</strong> Cowork will ask which folder on your computer to use. This is the folder Claude can read from and write to, nothing else on your computer is visible. For student work, pick (or create) a folder per student, something like <em>Students/Maya-Rodriguez</em>. You can change the folder any time.</div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text"><strong>Start a new conversation.</strong> Just like Chat, you'll see a message box. The difference is that Claude now has eyes on your folder and can use tools. Try a small first prompt like: <em>"What files do you see in this folder?"</em>, a quick sanity check that everything is wired up.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Ask Claude to do something that uses the folder.</strong> For example: <em>"Read Maya's activity list and her Common App draft, and flag which activities aren't being leveraged in the essay yet."</em> Claude will open the files, read them, and answer, no copy-paste needed.</div></div>
  <div class="step"><div class="step-num">5</div><div class="step-text"><strong>Let Claude produce files for you.</strong> Ask for something like: <em>"Create a one-page brief summarizing where Maya stands on each of her target schools, with next steps for our session tomorrow."</em> Claude will write a real Word doc into the folder and give you a link to open it. You click it and the doc opens on your computer.</div></div>
  <div class="step"><div class="step-num">6</div><div class="step-text"><strong>Turn on tools when you need them.</strong> Near the message composer you'll see a <strong>+ button</strong>. This is where you enable connectors (Monday, Drive, Gmail, Calendar, Claude in Chrome) and skills for the current conversation. Click it, toggle what you want, and Claude can use those tools in your next message.</div></div>
</div>

<div class="sh">Real Prepory examples of Cowork in action</div>

<details class="acc" open>
  <summary><span>Pre-session prep packet for a student</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>You have a 4pm session with a student tomorrow and 15 minutes to prep. Instead of reading through three months of session notes, you ask Cowork:</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Read everything in this folder about Priya. Create a one-page prep brief for tomorrow's session with: (1) where she stands on each target school, (2) the 2-3 open action items she still owes us, (3) anything from last session I specifically said I'd follow up on. Save it as "Priya-prep-2026-04-17.docx" in this folder.</pre><button class="copy-btn">Copy</button></div></div>
    <p>Claude reads the session notes, drafts, and any other files, then writes a formatted .docx prep brief into the folder. You open it, skim, and walk into the session ready.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Drafting session follow-up emails</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>Right after a session, ask Cowork:</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Using my session notes from today in this folder, draft a follow-up email to Priya and her parents. Recap what we covered, list the 3 action items she agreed to, and mention our next session is next Thursday at 4pm. Warm and encouraging tone. Then save it as a Gmail draft.</pre><button class="copy-btn">Copy</button></div></div>
    <p>With the Gmail connector enabled, Cowork creates a draft in your Gmail ready for you to review and send. You never leave the app.</p>
  </div>
</details>

<details class="acc">
  <summary><span>Building a slide deck from rough notes</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>You dump your messy notes for a parent webinar into a doc, then ask:</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Turn my notes in timeline-webinar-notes.md into a 15-slide presentation for parents of rising juniors. Use the pptx skill so the deck looks polished. Tone: warm and reassuring, not scary. Include speaker notes for each slide. Save as "Timeline-Webinar-Draft.pptx" in this folder.</pre><button class="copy-btn">Copy</button></div></div>
    <p>Claude uses the pptx skill to produce a real PowerPoint file in your folder. You open it in PowerPoint or Keynote, apply Prepory branding, and you're 80% there.</p>
  </div>
</details>

<div class="callout callout-info"><span class="callout-icon">ℹ️</span><span><strong>Cowork doesn't see anything you don't give it.</strong> It only reads the folders you've connected. Your other files, desktop, and documents stay completely private. If you want Claude to see a new file, move it into a connected folder.</span></div>
`},

/* SEC_CHAT */
{id:"chat",label:"Chat (Claude.ai)",group:"Claude Essentials",emoji:"💬",html:`
<h2 class="display">Chat for quick questions and content work.</h2>
<p>Chat is the standard Claude conversation experience. You can use it in the browser at claude.ai, on mobile, or right inside the desktop app (the desktop app has both Chat and Cowork). It's fast, lightweight, and perfect for things you don't need a folder for. Chat can use projects, skills, and cloud connectors (Monday, Drive, Gmail, Calendar) just like Cowork. The one thing it can't do is read or write files on your computer; that's what Cowork is for.</p>

<div class="sh">When to use Chat vs. Cowork</div>
<div class="grid-cards">
  <div class="use-case-card">
    <div class="use-case-task"><strong>Quick question:</strong> "What's the current WashU neuroscience Common App prompt?"</div>
    <div class="use-case-tool">→ Chat. Takes 3 seconds.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Draft a LinkedIn post:</strong> "Help me write a 150-word post about the August 1 deadline."</div>
    <div class="use-case-tool">→ Chat. Copy the output into LinkedIn.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>A quick Monday or Gmail check from your phone:</strong> "What's my next student session?"</div>
    <div class="use-case-tool">→ Chat works. Connectors follow your account.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Work with a student's actual files on your computer:</strong> session notes, drafts, activity list.</div>
    <div class="use-case-tool">→ Cowork. It can read the folder directly. Chat can't.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Produce a real document on your computer:</strong> .docx, .pptx, .xlsx saved to a folder.</div>
    <div class="use-case-tool">→ Cowork. Chat can generate file contents but can't save to your disk.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Use Claude in Chrome to drive your browser:</strong> publish a WP page, fill a form, use a site that needs login.</div>
    <div class="use-case-tool">→ Cowork (with the Chrome extension + toggled on).</div>
  </div>
</div>

<div class="sh">Getting started with Chat</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text">Go to <a href="${L.claude}" target="_blank" rel="noopener" class="ext-link">claude.ai</a> and sign in with your Prepory email.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text">You'll see a chat box. Type your prompt using the principles from Prompting 101, context, audience, format, tone.</div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text">Iterate in the same conversation. Claude remembers everything you've said within a single chat.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text">When you're done, copy the output into wherever it needs to go, email, doc, social post.</div></div>
</div>

<div class="callout callout-note"><span class="callout-icon">📌</span><span><strong>By default, each new Chat starts fresh.</strong> Two exceptions worth knowing: if you have <strong>Memory</strong> enabled on your account, Claude can carry your preferences and ongoing context across conversations. And if you're inside a <strong>Project</strong>, all of its custom instructions and files are loaded automatically every time. If you find yourself re-explaining the same context every day (your role, a student, a school), that's the signal to either turn on memory or build a project.</span></div>

<div class="sh">Two hidden-gem features in Chat</div>

<details class="acc" open>
  <summary><span>Artifacts, for content you'll reuse</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>When Claude produces something substantial like an email template, a checklist, or a chunk of HTML, it often appears as an <strong>artifact</strong> in a panel on the right. You can edit it, download it, or keep refining it with Claude, which is much nicer than scrolling back through the chat to find the latest version.</p>
    <p>Try this: <em>"Write a parent-facing one-pager about Prepory's approach to senior fall. Put it in an artifact so I can refine it."</em></p>
  </div>
</details>

<details class="acc">
  <summary><span>File uploads</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p>You can drag PDFs, images, Word docs, or spreadsheets directly into a Chat conversation. Claude will read them and answer questions about them. Useful for one-off analysis, "summarize this research paper," "pull the key dates out of this school's policy PDF."</p>
    <p>For ongoing work with the same files, use Cowork (pointed at a folder) or a Project (files stay uploaded forever) instead of re-uploading each time.</p>
  </div>
</details>
`},

/* SEC_SKILLS */
{id:"skills",label:"Skills",group:"Claude Essentials",emoji:"🧠",html:`
<h2 class="display">Skills, specialized playbooks for better outputs.</h2>
<p>Skills are folders of instructions and examples that make Claude dramatically better at specific kinds of work. Think of them as specialized playbooks: when Claude is about to make a Word doc, the <strong>docx skill</strong> kicks in and Claude follows a well-tested recipe for making a polished, properly formatted document. Without the skill, you'd get a rough draft. With it, you get something much closer to ready-to-send.</p>

<div class="callout callout-info"><span class="callout-icon">ℹ️</span><span>Skills work across Claude, Cowork, the desktop app, and claude.ai in the browser. They're often triggered automatically based on what you ask for, so you usually don't have to think about them. But knowing they exist helps you ask for the right things.</span></div>

<div class="sh">Skills you'll use at Prepory</div>
<div class="grid-cards">
  ${[['📄','docx','Polished Word documents, session notes, parent one-pagers, coaching briefs, letters. Formatting, headings, and structure look professional out of the box.'],['📊','pptx','Slide decks for webinars, internal training, and family presentations. Proper layouts, speaker notes, and slide hygiene.'],['📈','xlsx','Spreadsheets, college list comparisons, application tracking, budget models. Formulas and formatting, not just flat data.'],['📑','pdf','Reading existing PDFs (school policy docs, Common Data Sets) and producing new ones (final handouts, read-only one-pagers).']].map(([e,t,d])=>`<div class="use-case-card" style="display:flex;gap:14px"><span style="font-size:18px">${e}</span><div><div style="font-weight:700;color:var(--ink);font-size:14px">${t}</div><div style="font-size:13px;color:var(--muted);margin-top:3px;line-height:1.6">${d}</div></div></div>`).join('')}
</div>

<div class="sh">How to actually use a skill</div>
<p>Most of the time, just ask Claude for what you want and it'll pick the right skill on its own. If you want to be explicit, mention the skill by name. For skills that drive other tools (for example, a skill that uses Claude in Chrome to do something in the browser), make sure the underlying tool is also toggled on via the <strong>+ button</strong> near the message composer before you send.</p>

<div class="prompt-wrap"><div class="prompt-label">Example prompts that trigger skills</div><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Use the docx skill to create a polished session notes document for my 3pm with Priya today. Include: summary, feedback given, action items, next-session focus. Save to this folder.</pre><button class="copy-btn">Copy</button></div></div>

<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Build a 12-slide deck for parents of rising sophomores on "when to start thinking about college." Use the pptx skill so it looks clean. Include speaker notes.</pre><button class="copy-btn">Copy</button></div></div>

<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Create an xlsx college list tracker for this student with columns: School, Reach/Target/Safety, Deadline Type, Supplementals Required, Draft Status, Last Updated. Pre-fill rows for each of her 10 target schools.</pre><button class="copy-btn">Copy</button></div></div>

<div class="sh">Creating your own custom skills with skill-creator</div>
<p>You don't have to wait for the AI team to build a skill for you. The desktop app ships with a special skill for building skills, called <strong>skill-creator</strong>. It walks you through turning a repeated workflow into a reusable recipe that Claude can trigger automatically, in plain English, no coding.</p>
<p><strong>The best candidates for a custom skill:</strong></p>
<ul>
  <li>Something you ask Claude for <em>the same way every time</em> (e.g., "format my weekly coaching recap using this exact structure").</li>
  <li>Something where Claude's default output isn't hitting and you always give the same corrections.</li>
  <li>A Prepory-specific piece of writing or process that needs a consistent voice and shape (parent intro emails, post-consult follow-ups, school-fit summaries).</li>
</ul>
<p><strong>How to use skill-creator, step by step:</strong></p>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text">Open a Cowork conversation. Click the <strong>+ button</strong> near the message composer and toggle on <strong>skill-creator</strong>.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text">Tell Claude what you want the new skill to do, in plain English. The more specific, the better: <em>"I want a skill that takes rough coaching session notes and turns them into a structured parent follow-up email with a recap, action items, and next-session date."</em></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text"><strong>Give it examples.</strong> Paste 2–3 real inputs (your rough notes) and the exact outputs you'd want. Examples are the single biggest lever, skills with good examples are dramatically better than ones without.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Answer Claude's questions.</strong> skill-creator will ask clarifying questions, tone, length, edge cases, what to avoid. Answer carefully. These become the skill's guardrails.</div></div>
  <div class="step"><div class="step-num">5</div><div class="step-text"><strong>Let Claude write and save the skill.</strong> It'll appear in your + menu afterwards, and you (or anyone you share it with) can trigger it by name.</div></div>
  <div class="step"><div class="step-num">6</div><div class="step-text"><strong>Test and iterate.</strong> Run the skill on a fresh input, see what it produces, and if it's off, go back into skill-creator and refine. A skill gets good over 3–4 rounds of use-and-adjust, don't expect perfect on the first pass.</div></div>
</div>
<div class="callout callout-tip"><span class="callout-icon">💡</span><span>If your custom skill would be useful for the whole team, share it with the Prepory AI team. We can promote it to a company-wide skill so every coach gets it automatically.</span></div>

<div class="sh">We'll keep building more Prepory-specific skills</div>
<p>The AI team is also building skills centrally. As we learn which tasks get repeated (and where Claude's default output isn't quite hitting), we'll ship skills tuned for Prepory's voice, style, and workflow. If you notice yourself giving the same instructions to Claude over and over, <strong>that's a signal, either build it yourself with skill-creator, or flag it so we can build it for everyone</strong>.</p>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span>Skills compose with projects. Example: the school-specific Stanford project has Stanford's Insider Brief loaded, and the docx skill makes sure the output is a polished, properly formatted Word doc. Together, they produce advice that's both Stanford-specific and ready to send.</span></div>
`},

/* SEC_CONNECTORS */
{id:"connectors",label:"Connectors",group:"Claude Essentials",emoji:"🔌",html:`
<h2 class="display">Connectors, plug Claude into our tools.</h2>
<p>Connectors give Claude secure access to the apps we already use every day. Once connected, Claude can read from and (where allowed) update these tools directly in the conversation, no copy-paste, no switching windows.</p>

<div class="sh">The five connectors that matter most at Prepory</div>

<div class="tool-card">
  <div class="tool-head"><span class="tool-name">Monday</span><span class="tool-where">Coach ops</span></div>
  <p style="margin:6px 0">Claude can reach into Monday to help with pipeline work, pulling information about your boards and items so you don't have to dig through them manually. Exact capabilities depend on how the connector is set up for your workspace, so try a small ask first and see what's available.</p>
  <div class="tool-how"><strong>Try asking Cowork:</strong> "Look at my Monday workspace and summarize where each of my students stands right now."</div>
</div>

<div class="tool-card">
  <div class="tool-head"><span class="tool-name">Google Drive</span><span class="tool-where">Shared resources</span></div>
  <p style="margin:6px 0">Claude can search across Drive, open docs, and pull specific passages from them. Great for surfacing the right Insider Brief, curriculum doc, or exemplar without manually hunting for it.</p>
  <div class="tool-how"><strong>Try asking:</strong> "Find the Stanford Insider Brief in Google Drive and summarize what it says about what the Stanford committee values most in the 'What matters most to you?' essay."</div>
</div>

<div class="tool-card">
  <div class="tool-head"><span class="tool-name">Gmail</span><span class="tool-where">Client comms</span></div>
  <p style="margin:6px 0">Claude can search your inbox, summarize long threads, and draft replies directly into your Gmail as drafts (never sent automatically, you always review). Perfect for catching up after PTO or drafting post-session recap emails.</p>
  <div class="tool-how"><strong>Try asking:</strong> "Find the most recent thread with Priya's mom. Summarize what she's asked for, and draft a reply addressing each of her questions. Save as a draft in Gmail."</div>
</div>

<div class="tool-card">
  <div class="tool-head"><span class="tool-name">Google Calendar</span><span class="tool-where">Scheduling</span></div>
  <p style="margin:6px 0">Claude can see your upcoming sessions, find times that work, create events, and prep you for what's next on your calendar.</p>
  <div class="tool-how"><strong>Try asking:</strong> "What do I have on my calendar tomorrow? For each student session, pull their file and give me a 2-sentence heads-up on what we're supposed to cover."</div>
</div>

<div class="tool-card">
  <div class="tool-head"><span class="tool-name">Claude in Chrome <span style="font-size:10.5px;background:var(--accent);color:white;padding:2px 8px;border-radius:999px;margin-left:6px;letter-spacing:.4px">POWERFUL</span></span><span class="tool-where">Real browser actions</span></div>
  <p style="margin:6px 0">Claude in Chrome is a browser agent. Instead of just fetching a page, it can actually <strong>drive your Chrome browser</strong>, open tabs, fill forms, click buttons, log into WordPress, navigate Common App, publish a page, or pull data from a site that needs you to be signed in. Think of it as "Claude can use the web the way you would."</p>
  <div class="tool-how"><strong>Try asking:</strong> "Open the WordPress admin for staging2.prepory.com and create a new page called 'Executive Coaching for CMOs.' Use the body copy in this folder and save it as a draft."</div>
</div>

<div class="sh">Setting up the standard connectors (Monday, Drive, Gmail, Calendar)</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text">Open the Claude desktop app and head to the <strong>Connectors</strong> area (look under Settings or Customize, the exact spot can vary by app version).</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text">Click <strong>Connect</strong> next to Monday, Google Drive, Gmail, and Google Calendar. You'll be prompted to sign in and approve the permissions Claude needs. Use your Prepory account whenever it asks.</div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text">Once connected, Claude can use the tool from any conversation. You don't need to re-authorize every time.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Enable the connector in your conversation.</strong> Open a Cowork chat and click the <strong>+ button</strong> near the message composer. You'll see a list of connectors and skills, toggle on the ones you want Claude to use for this chat.</div></div>
  <div class="step"><div class="step-num">5</div><div class="step-text"><strong>Test it.</strong> Ask Claude "What's on my calendar this week?" or "What are my 3 most recent Monday items?", if it returns real data, you're connected.</div></div>
</div>

<div class="sh">Setting up Claude in Chrome, step by step</div>
<p>Claude in Chrome takes three separate pieces: a Chrome extension, a desktop app setting, and a per-conversation toggle. Here's the full walkthrough.</p>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text"><strong>Install the Chrome extension.</strong> In Google Chrome, go to the <a href="https://chromewebstore.google.com/" target="_blank" rel="noopener" class="ext-link">Chrome Web Store</a> and search for <em>"Claude"</em>, you're looking for the official Anthropic extension (sometimes called "Claude in Chrome"). Click <strong>Add to Chrome</strong> and approve the permissions. You'll see a small Claude icon appear near your Chrome toolbar. That means it's installed.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text"><strong>Sign the extension in to your Prepory account.</strong> Click the extension icon and sign in with the same email you use for the desktop app. This links the browser to your team account.</div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text"><strong>Enable Claude in Chrome inside the desktop app.</strong> Open the Claude desktop app, go to the <strong>Connectors</strong> area in settings, find <em>Claude in Chrome</em>, and switch it on. You may be asked to confirm that the extension is installed.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Turn it on for a conversation using the + button.</strong> Open a Cowork chat and click the <strong>+ button</strong> near the message composer. A panel will pop up with available tools and connectors. Find <strong>Claude in Chrome</strong> and toggle it on. That plus button is the real "on switch." Without it, Claude won't drive the browser, even if the extension is installed.</div></div>
  <div class="step"><div class="step-num">5</div><div class="step-text"><strong>Give it a first task.</strong> Make sure Chrome is open, then ask something like: <em>"Open Common App and tell me what the current personal statement prompts are."</em> You'll see Chrome pop into focus, Claude will open a new tab, and it'll narrate what it's doing as it navigates.</div></div>
</div>
<div class="callout callout-tip"><span class="callout-icon">💡</span><span><strong>Keep an eye on the window while it works.</strong> Claude in Chrome tells you every click and navigation in real time. If it's about to do something you don't want, you can cancel. For anything that submits a form or sends data, it'll pause and ask for confirmation.</span></div>

<div class="callout callout-warn"><span class="callout-icon">⚠️</span><span><strong>Claude will check in before doing something destructive.</strong> Things like sending an email, deleting a Monday item, declining a calendar invite, or submitting a form in Chrome typically require your explicit confirmation. Reading, searching, and drafting happen more freely. How often Claude asks for permission can be adjusted in your connector settings, so if you've loosened it, pay extra attention to what's about to happen.</span></div>

<div class="callout callout-info"><span class="callout-icon">ℹ️</span><span>More connectors will be added over time (Slack, HubSpot, and others are likely candidates). If there's a tool you use daily that would be game-changing if Claude could reach it, flag it.</span></div>
`},

/* SEC_PROJECTS */
{id:"projects",label:"Projects",group:"Claude Essentials",emoji:"📁",html:`
<h2 class="display">Projects, reusable workspaces for recurring work.</h2>
<p>A Project is a permanent workspace inside Claude with two superpowers: <strong>custom instructions</strong> (a system prompt that's always active) and <strong>reference files</strong> (documents Claude can always read). Every conversation you start inside a project automatically has both loaded. No re-uploading, no re-explaining.</p>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span><strong>Rule of thumb:</strong> if you've caught yourself typing the same context into Claude three or more times, turn it into a Project. It'll save you hours over a year.</span></div>

<div class="sh">What projects unlock</div>
<div class="grid-cards">
  ${[['🎓','A project per student','All their drafts, notes, activity list, and target-school intel in one place. Claude has full context every time you ask about them.'],['🏫','A project per school','Insider Brief + Common Data Set + great exemplars. Ask school-specific questions and get calibrated, on-brand answers.'],['✍️','A project per recurring deliverable','Webinar scripts, parent newsletter, LinkedIn posts, with Prepory brand voice and past examples pre-loaded.']].map(([e,t,d])=>`<div class="use-case-card" style="display:flex;gap:14px"><span style="font-size:18px">${e}</span><div><div style="font-weight:700;color:var(--ink);font-size:14px">${t}</div><div style="font-size:13px;color:var(--muted);margin-top:3px;line-height:1.6">${d}</div></div></div>`).join('')}
</div>

<div class="sh">School-specific coach projects, the flagship use case</div>
<p>The Prepory AI team is building a set of <strong>school-specific Projects</strong> for coaches. Each one is tuned for a single school and designed to give coaches fast, on-brand, on-strategy advice for that school, grounded in Prepory's insider knowledge rather than the generic public information you'd get from a web search.</p>

<div class="card" style="background:linear-gradient(135deg,var(--primary-soft),#f9fbf9);border-color:rgba(11,71,59,.12)">
  <div style="font-size:11px;font-weight:700;color:var(--accent-dk);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:8px">Example project · First one rolling out</div>
  <h3 class="subhead" style="margin:0 0 8px">🌲 Stanford Coach Project</h3>
  <p style="margin:0">A dedicated project loaded with Stanford's Insider Brief, exemplar essays that have worked in past cycles, Prepory's Stanford-specific coaching playbook, and the current year's prompts. Any coach working with a Stanford applicant can open this project and ask questions like:</p>
  <ul style="margin-top:10px">
    <li><em>"What does Stanford's committee actually want to see in the 'What matters most to you?' essay, and what are 3 common ways students miss the mark?"</em></li>
    <li><em>"Here's my student's draft of the 'roommate letter' supplemental, how does it compare to the exemplars in this project, and what's the single biggest gap?"</em></li>
    <li><em>"Based on my student's profile [paste notes], which angle for the short-answer questions would likely resonate most with Stanford specifically?"</em></li>
  </ul>
  <p style="margin-top:10px">The answers are grounded in Prepory's intel, not a generic Google search, and reflect what actually wins with Stanford admissions, not what a random AI thinks wins.</p>
  <div class="feature-pill" style="margin-top:10px">More school projects coming</div>
  <span style="font-size:12.5px;color:var(--muted);margin-left:6px">We're starting with Stanford and rolling out additional school-specific projects as we build them. Coaches will get access as each one launches.</span>
</div>

<div class="sh">Creating your own project, step by step</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text">In the Claude desktop app or at <a href="${L.claude}" target="_blank" rel="noopener" class="ext-link">claude.ai</a>, click <strong>Projects</strong> in the sidebar, then <strong>New Project</strong>.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text"><strong>Give it a clear name.</strong> "Maya Rodriguez, Class of 2026" or "Stanford Applicants" or "Prepory Blog Drafts." Specific beats clever.</div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text"><strong>Write custom instructions.</strong> This is the "always-on" system prompt. Tell Claude who it's helping, what context to assume, what Prepory's voice sounds like, and what to avoid. A good instruction block is 4–10 sentences.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Upload reference files.</strong> Drag in the Insider Brief, exemplars, session notes, activity lists, or anything else Claude should always be able to reference. Claude will cite which file it's drawing from.</div></div>
  <div class="step"><div class="step-num">5</div><div class="step-text"><strong>Use the project.</strong> Start a new conversation from inside the project. Every message you send now has the custom instructions and files as context automatically.</div></div>
</div>

<div class="sh">Example custom instructions for a student project</div>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">You are helping a Prepory college admissions counselor work with Maya Rodriguez, a high school senior from Chicago applying to Stanford (REA), Northwestern, UChicago, and UMich. She's interested in cognitive science and creative writing.

When I ask questions about Maya, use the session notes, draft essays, and activity list in this project as your primary context. If something isn't in the files, say so rather than guessing.

Voice: coach-to-coach. Direct, specific, actionable. No filler. Never write prose that would go directly into Maya's essays, your job is to support my coaching, not replace Maya's voice. If I ask for draft language, offer it as "options for Maya to consider" rather than finished text.

Always flag places where something is worth verifying against the school's official site or the Insider Brief.</pre><button class="copy-btn">Copy</button></div></div>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span>The more specific your custom instructions, the more useful the project. "Help me with college stuff" gives you generic output. "Help me coach Maya, who's applying REA to Stanford for cognitive science, using the files in this project" gives you output you can actually act on.</span></div>
`},

/* SEC_LIMITS */
{id:"limits",label:"Working within usage limits",group:"Claude Essentials",emoji:"⚡",html:`
<h2 class="display">Working within usage limits.</h2>
<p>Every Claude account has usage limits that reset on a rolling basis. For most Prepory work you'll never notice them, but a handful of habits stretch your budget significantly, and a few small mistakes can burn through it fast. This section is short. Read it once and you'll be set.</p>

<div class="sh">The habits that save usage</div>

<div class="grid-cards">
  ${[
    ['🧵','Start a new chat when you switch topics','Long conversations keep the entire history in play every turn, which costs more and also dilutes Claude\'s focus. When you move from "draft a parent email" to "help me build a webinar outline," start a new chat.'],
    ['📁','Put repeat context in a Project, not every prompt','If you\'re pasting the same Insider Brief, activity list, or exemplar into three different chats a day, stop. Put it in a project once. Every conversation inside the project references it for free.'],
    ['📂','Use Cowork folder access instead of pasting giant files','Pasting a 10-page student file into a chat uses far more budget than pointing Cowork at the folder and asking Claude to read what it needs. Same outcome, a fraction of the cost.'],
    ['🎯','Pick the right model for the task','Opus is the most powerful but uses the most budget. For quick drafts, copy edits, summaries, and simpler work, switch to Sonnet or Haiku, you\'ll get the job done with way less usage. Save Opus for the hard stuff: nuanced strategy, complex synthesis, high-stakes writing.'],
    ['✂️','Keep prompts focused','A clear, specific 2-sentence prompt generates less usage than a rambling 10-paragraph one, and almost always produces better output anyway. Prompting 101, Principle 1 lives here too.'],
    ['📦','Batch related questions in one conversation','If you have five questions about a single student, ask them in one chat (so Claude only loads the context once) instead of five separate chats.'],
    ['⛔','Stop runaway loops fast','If Claude seems to be spinning, producing walls of repeated output, or stuck re-asking for files, cancel it. Waiting it out burns usage for nothing.']
  ].map(([e,t,d])=>`<div class="use-case-card" style="display:flex;gap:14px"><span style="font-size:18px">${e}</span><div><div style="font-weight:700;color:var(--ink);font-size:14px">${t}</div><div style="font-size:13px;color:var(--muted);margin-top:4px;line-height:1.65">${d}</div></div></div>`).join('')}
</div>

<div class="sh">If you hit a limit</div>
<p>Claude will tell you when your limit resets, it's usually a short wait, not catastrophic. You can keep working in lighter models, switch to Chat if you were in Cowork, or just come back when the reset lands. This isn't a reason to worry, just a reason to build good habits now so you stay ahead of it.</p>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span><strong>The 80/20 rule:</strong> the single biggest usage-saver is using Projects and Cowork folder access instead of re-pasting the same context into Chat every day. If you only take one habit from this section, make it that one.</span></div>

<div class="callout callout-info"><span class="callout-icon">ℹ️</span><span>Limits are set at the account level by Anthropic and vary by plan. If you're running into them frequently despite using these habits, flag it. We may be able to adjust your team's plan.</span></div>
`},

/* SEC_BRAINSTORM */
{id:"brainstorm",label:"Brainstorming & Ideation",group:"Core Skills",emoji:"💡",html:`
<div class="chapter-cover skills">
  <div class="chapter-label"><span class="chapter-num">Part 03</span> Core Skills</div>
  <h2 class="chapter-title">Five things Claude is great at that apply to everyone.</h2>
  <p class="chapter-desc">These aren't tools, they're skills that transfer across roles. A coach, a marketer, and an ops lead all use brainstorming, writing, research, summarizing, and documentation. Each section shows which Claude tool fits best.</p>
  <div class="chapter-meta">
    <span class="chapter-chip">💡 Brainstorming</span>
    <span class="chapter-chip">✍️ Writing</span>
    <span class="chapter-chip">🔍 Research</span>
    <span class="chapter-chip">📋 Summarizing</span>
    <span class="chapter-chip">📁 Documentation</span>
  </div>
</div>
<p>Generating ideas fast is one of Claude's strongest skills. What might take you 45 minutes of staring at a blank doc takes about 90 seconds. The key: treat the output as raw material, not finished product. You filter, refine, and decide. Claude just gets you past the blank page.</p>

<div class="sh">Which tool to use</div>
<div class="use-case-card" style="margin-bottom:10px">
  <div class="use-case-task"><strong>Pure idea generation with no files involved:</strong> blog topics, email hooks, essay angles.</div>
  <div class="use-case-tool">→ Chat is faster.</div>
</div>
<div class="use-case-card">
  <div class="use-case-task"><strong>Brainstorming with a student's actual context:</strong> their activities, drafts, notes.</div>
  <div class="use-case-tool">→ Cowork (pointed at their folder) or a student Project.</div>
</div>

<div class="sh">Brainstorming essay topics with a student, step by step</div>
<p>You're working with Priya, rural Georgia, first-gen, robotics captain, weekend hardware store job, applying for mechanical engineering. She keeps wanting to write about robotics. You think it's too predictable.</p>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text">Open Claude (Chat or Cowork). If you have a Priya project, use that. Claude already knows her. Otherwise, spend 60 seconds writing out what you know about her before typing anything else.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text">Ask for a handful of options with a specific ask:</div></div>
</div>

<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm a Prepory admissions counselor working with Priya. She grew up in rural Georgia, is first-gen, captains the robotics team, and works at her family's hardware store on weekends. She's applying to Georgia Tech, Purdue, and Clemson for mechanical engineering. She keeps wanting to write about robotics but I think the topic is too predictable for her.

Suggest 5 different essay angles she could explore instead. Focus on angles that would feel specific and fresh, not Common App clichés. For each, write one sentence on what the essay might explore and why it could be compelling.</pre><button class="copy-btn">Copy</button></div></div>

<div class="steps">
  <div class="step"><div class="step-num">3</div><div class="step-text"><strong>Read the results and react.</strong> Some will feel off, that's fine. Maybe one suggests the time she fixed a broken pipe at the hardware store using robotics logic. That sparks something.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Go deeper on what clicks.</strong> Stay in the same conversation. Ask: "I like the hardware store angle. What are 4 specific scenes or moments she could write about to make this feel vivid and concrete?"</div></div>
  <div class="step"><div class="step-num">5</div><div class="step-text"><strong>Use the output as conversation fuel in your next session.</strong> Don't read the list to Priya. Instead: "What if instead of robotics, you wrote about that moment at the store when you figured out the pipe?" Claude gave you the seed. Your coaching makes it personal.</div></div>
</div>

<div class="sh">More brainstorming prompts</div>

<details class="acc">
  <summary><span>Content ideas for marketing</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm on Prepory's marketing team. Common App opens August 1st and families are starting to panic about the timeline. Give me 5 content ideas for our blog and social channels that would be useful and timely for parents of rising seniors right now.

For each: a working title, one-sentence description, and which platform it's best for (blog, LinkedIn, Instagram, or email). We've recently published about essay topic selection and test-optional policies, avoid those.</pre><button class="copy-btn">Copy</button></div></div>
    <p>Follow up with: "Expand on ideas #2 and #4. For each, give me a more detailed outline: key points, strong opening hook, and a CTA."</p>
  </div>
</details>

<details class="acc">
  <summary><span>Angles for a sales or outreach challenge</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm on Prepory's sales team. A parent attended our 'Ivy League Admissions Myths' webinar three weeks ago, opened our follow-up email, but never booked a consultation. Her daughter is a rising senior applying to Brown, Dartmouth, and Northwestern.

Give me 5 different angles for a re-engagement email. For each, explain what emotional trigger or practical concern it addresses and suggest a one-sentence hook.</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>

<details class="acc">
  <summary><span>Structuring a session with a stuck student</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm trying to figure out how to structure a 60-minute 'college list building' session with a student who has a 3.6 GPA, 1350 SAT, and wants to study environmental science. She has no schools on her list yet and is getting paralyzed by the number of options.

Give me 5 different ways I could structure this conversation, each one prioritizing a different starting point. For each, explain the tradeoff.</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span>If ideas feel generic, your prompt is probably too vague. Add a real constraint: a specific student, deadline, or thing you want to avoid. The output will sharpen immediately.</span></div>
`},

/* SEC_WRITING */
{id:"writing",label:"Writing & Editing",group:"Core Skills",emoji:"✍️",html:`
<p>Writing is what most people think of first when they think of Claude. Whether it's an email to an anxious parent, a blog post about FAFSA changes, or a follow-up sequence for prospective families, Claude can give you a strong first draft in minutes. Know which tool to use, and always edit before it goes anywhere.</p>

<div class="sh">Which tool, and when</div>
<div class="grid-cards">
  <div class="use-case-card">
    <div class="use-case-task"><strong>Emails to clients, based on your notes and past threads:</strong></div>
    <div class="use-case-tool">→ Cowork with the Gmail connector. Ask it to draft directly into Gmail.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>A session notes doc, one-pager, or internal memo:</strong></div>
    <div class="use-case-tool">→ Cowork + docx skill. Real Word doc in your folder.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Social copy, subject lines, quick marketing iterations:</strong></div>
    <div class="use-case-tool">→ Chat. Fast back-and-forth, copy out when you're happy.</div>
  </div>
</div>

<div class="sh">Drafting a parent email in Cowork</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text">Open Cowork with the student's folder selected. If you have the Gmail connector set up, Claude can read recent threads and write drafts directly into Gmail.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text">Ask for what you need with full context:</div></div>
</div>

<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I need to follow up with Karen (Priya's mom) after today's session. Read my session notes in this folder and the latest thread with Karen in Gmail. Draft an email that: (1) recaps what Priya and I decided on for her essay direction, (2) addresses Karen's concern from her last email about timeline, (3) confirms our next session.

Warm, reassuring tone. Karen is nervous about this cycle. Under 200 words. Save as a Gmail draft, don't send.</pre><button class="copy-btn">Copy</button></div></div>

<div class="steps">
  <div class="step"><div class="step-num">3</div><div class="step-text">Open Gmail, review the draft, add anything missing, and send.</div></div>
</div>

<div class="sh">Repurposing content across channels</div>
<p>You just published a blog post and need versions for LinkedIn, Instagram, and email. Don't rewrite three times, feed it to Claude:</p>

<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Prepory's brand voice: warm, knowledgeable, mentor-like. We don't talk down to families and never use scare tactics about admissions odds. We're the confident, reassuring expert in the room.

Turn this blog post into:
- 3 LinkedIn posts: each a distinct angle, 150-200 words, thought-leadership tone. Don't start all three the same way.
- 3 Instagram captions: under 90 words, hook in the first line, conversational.
- 1 email subject line (under 50 chars).

Blog post: [paste your post here]</pre><button class="copy-btn">Copy</button></div></div>

<div class="sh">Tightening existing drafts</div>
<details class="acc">
  <summary><span>Sharpen a draft without restructuring</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Edit this for clarity and concision. Cut filler words, tighten sentences, and flag anywhere it sounds like AI wrote it. Don't change the structure, just make the writing sharper. Here: [paste]</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>
<details class="acc">
  <summary><span>Hit a specific word count</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">This draft is running too long. I need it under 200 words. Cut what's least essential while keeping the core message and the specific Stanford reference. Here: [paste]</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>

<div class="callout callout-warn"><span class="callout-icon">⚠️</span><span>Always review AI-written copy for accuracy before it goes anywhere. If there's a stat or specific claim you didn't provide, verify it.</span></div>
`},

/* SEC_RESEARCH */
{id:"research",label:"Research & Explanation",group:"Core Skills",emoji:"🔍",html:`
<p>Claude is a powerful research tool. It can explain complicated topics in plain language, help you get up to speed on schools or programs quickly, and serve as a sounding board when you're thinking through a decision.</p>

<div class="sh">Four research modes, four setups</div>
<div class="grid-cards">
  <div class="use-case-card">
    <div class="use-case-task"><strong>Broad public research:</strong> a school's culture, current trends, what's changed with Common App.</div>
    <div class="use-case-tool">→ Chat (or Cowork) with <strong>web search</strong>. Fast, wide-net. Verify specific stats.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Sites that need a login, a form, or can't be pulled with a plain search:</strong> the Common App portal, your WordPress admin, a school's internal portal, a page behind a paywall you subscribe to.</div>
    <div class="use-case-tool">→ Cowork with <strong>Claude in Chrome</strong>. It drives your browser the way you would.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Source-grounded research:</strong> questions about documents you've uploaded (Insider Brief, Common Data Set, student file).</div>
    <div class="use-case-tool">→ A school Project, or Cowork with the folder.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Private internal research:</strong> Monday data, Drive docs, Gmail threads.</div>
    <div class="use-case-tool">→ Cowork with connectors.</div>
  </div>
</div>

<div class="sh">Web search vs. Claude in Chrome, how to choose</div>
<p>Both tools reach the web, but they do very different things. The short version: <strong>web search</strong> is Claude reading the public internet quickly. <strong>Claude in Chrome</strong> is Claude actually <em>using</em> your browser, clicking, scrolling, signing in, filling things out. Pick based on whether the task is "read" or "do."</p>
<div class="grid-cards">
  <div class="use-case-card">
    <div class="use-case-task"><strong>Use web search when:</strong></div>
    <div class="use-case-tool" style="color:var(--ink-2);font-weight:500;font-size:13.5px">
      • You just need facts, context, or a quick scan of a topic.<br>
      • The info is on public pages (school sites, news articles, blog posts).<br>
      • You're fine with Claude summarizing rather than reading the exact page.<br>
      • Speed matters and you want a 10-second answer, not a multi-step browser flow.
    </div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Use Claude in Chrome when:</strong></div>
    <div class="use-case-tool" style="color:var(--ink-2);font-weight:500;font-size:13.5px">
      • You need to <em>do</em> something, publish a WordPress page, fill a form, submit a request.<br>
      • The site requires a login (Common App, WordPress admin, CRM).<br>
      • The content is dynamic, behind tabs, accordions, or JS, where search summaries come up thin.<br>
      • You want Claude to read the <strong>exact</strong> current page, not a cached or summarized version.<br>
      • You want to watch and confirm before anything is saved or sent.
    </div>
  </div>
</div>
<div class="callout callout-tip"><span class="callout-icon">💡</span><span><strong>Default to web search first.</strong> It's faster and cheaper. Only reach for Claude in Chrome when search can't get what you need, or when the task is actually a <em>browser action</em>, not a lookup.</span></div>

<div class="sh">Quick school overview before a session</div>
<p>You have a session in an hour with a student interested in Tulane for public health. You want to go in prepared without 45 minutes of website reading.</p>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I have a coaching session in an hour with a student interested in Tulane for public health. She's also drawn to New Orleans culture and community engagement.

Give me a concise coaching brief: academic strengths in public health, what makes Tulane's culture distinctive, notable experiential learning or community engagement opportunities, and what their admissions committee tends to value. Only the things I'd use in conversation. Flag anything I should verify on their website.</pre><button class="copy-btn">Copy</button></div></div>

<div class="callout callout-note"><span class="callout-icon">📌</span><span>Want this even better? Drop Tulane's Insider Brief and Common Data Set into a school Project. Every answer from that project is grounded in Prepory's intel plus the official data, not just what's floating around the web.</span></div>

<div class="sh">Using Claude as a thinking partner</div>
<p>One of the most underused modes: asking Claude to help you think through a decision, not just look things up.</p>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm building a college list for a student with a 3.7 GPA, 1480 SAT, interested in film production, first-gen, from Texas. She wants to be in or near a city. Strong emotional pull to NYU but worried about cost.

Help me think through a balanced list of ~10 schools (3 reach, 4 target, 3 safety) with brief reasoning for each. Note where financial aid may be a key factor. Then recommend whether she should burn her ED shot on NYU or save it for a school likely to give better aid.</pre><button class="copy-btn">Copy</button></div></div>

<div class="sh">Comparing schools for a student</div>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">A student interested in political science and potentially law school is comparing Georgetown, Tufts, and William & Mary. She cares most about: (1) political science faculty quality, (2) DC internship access, (3) campus social culture.

Compare these three across those dimensions. Note any meaningful differences in their admissions profiles for a student with a 3.8 GPA and 1450 SAT.</pre><button class="copy-btn">Copy</button></div></div>
<p>If the comparison feels surface-level, push deeper: "You mentioned Georgetown's DC proximity is an advantage. Specifically, what internship pipelines does Georgetown offer for poli sci students that the other two don't?"</p>

<div class="callout callout-warn"><span class="callout-icon">⚠️</span><span>Claude can search the web but still makes factual errors on school-specific data. Acceptance rates, score ranges, and financial aid figures change yearly. <strong>Always verify hard numbers</strong> against the school's website or current Common Data Set before sharing with families.</span></div>
`},

/* SEC_SUMMARIZE */
{id:"summarize",label:"Summarizing & Distilling",group:"Core Skills",emoji:"📋",html:`
<p>Condensing long information is one of Claude's fastest, most reliable wins. A 40-email thread. Eight pages of meeting notes. Five school documents you need to synthesize before a session. Claude cuts through all of it, and this is a great first thing to try if you've never used these tools.</p>

<div class="sh">Which tool, by situation</div>
<div class="grid-cards">
  <div class="use-case-card">
    <div class="use-case-task"><strong>Summarize a long email thread:</strong></div>
    <div class="use-case-tool">→ Cowork with Gmail connector, or forward the thread to Chat and ask.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Summarize a single document:</strong></div>
    <div class="use-case-tool">→ Drag it into Chat, or ask Cowork to read it from your folder.</div>
  </div>
  <div class="use-case-card">
    <div class="use-case-task"><strong>Synthesize across multiple docs:</strong></div>
    <div class="use-case-tool">→ A Project with all files uploaded, or Cowork on a folder containing them.</div>
  </div>
</div>

<div class="sh">Summarizing an email thread via Cowork</div>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Open my most recent thread with Priya's parents in Gmail. Summarize in 5 sentences: (1) key context, (2) any decisions that were made, (3) any open asks from them I haven't responded to yet.</pre><button class="copy-btn">Copy</button></div></div>

<div class="sh">Summarizing a single doc</div>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Summarize the session-notes doc in my folder. Pull out: (1) the student's top school preferences, (2) any concerns the parents raised, (3) agreed-upon next steps with owners.</pre><button class="copy-btn">Copy</button></div></div>

<div class="sh">Synthesizing across multiple docs</div>
<p>This is where Projects shine. Drop five sets of session notes into a student project, then ask:</p>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Across all my session notes with Maya from the past month: what themes keep coming up in her concerns about the process? What action items were agreed on that haven't been revisited? What's the current state of her college list?</pre><button class="copy-btn">Copy</button></div></div>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span>The most useful summaries are specific. "Summarize this" gives you a generic overview. "What action items were agreed on and who owns each?" gives you something you can act on immediately.</span></div>
`},

/* SEC_PROCESS */
{id:"process",label:"Process Documentation",group:"Core Skills",emoji:"📁",html:`
<p>Most institutional knowledge at Prepory lives in people's heads or in scattered notes that only make sense to whoever wrote them. Claude is excellent at taking disorganized, messy knowledge and turning it into something structured that anyone can follow, quickly, without requiring you to be a good writer.</p>

<div class="sh">The ideal setup: Cowork + docx skill</div>
<p>Open Cowork, point it at a folder where you want to keep your SOPs, and ask Claude to use the <strong>docx skill</strong> so the output is a polished Word doc you can share with the team.</p>

<div class="sh">Turning rough notes into a structured SOP</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-text"><strong>Dump everything you know</strong> into a text file or directly into Cowork. Bullet points, fragments, whatever. 5–10 minutes of brain dump is enough.</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text"><strong>Ask Claude to structure it</strong> using the docx skill:</div></div>
</div>

<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Use the docx skill. Turn these rough notes into a structured SOP (Standard Operating Procedure). For each step:
1. Number + short action title
2. Exactly what to do, assume the reader has never done this and knows nothing about Prepory
3. Who's responsible
4. Common mistakes or edge cases to flag

Plain, direct language. Checklists where possible. Save as "SOP-new-student-onboarding.docx" in this folder.

Here are my notes: [paste your notes]</pre><button class="copy-btn">Copy</button></div></div>

<div class="steps">
  <div class="step"><div class="step-num">3</div><div class="step-text"><strong>Review carefully.</strong> Don't just skim. Claude can misorder steps or infer things from incomplete notes. Fix anything that doesn't match reality.</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text"><strong>Have one teammate who actually does the process</strong> read through and flag anything confusing, wrong, or missing. SOPs are only useful if accurate.</div></div>
</div>

<div class="sh">More documentation prompts</div>

<details class="acc">
  <summary><span>Updating an existing SOP</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Here's our current SOP for [process]: [paste doc]. These things have changed: [list changes]. Update the doc to reflect them. Also flag any steps that seem unclear, outdated, or could be simplified without losing important detail.</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>

<details class="acc">
  <summary><span>Turning a meeting into action items</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Here are my notes from a team meeting: [paste]. Do three things:
1. Write a 2-sentence summary of what was decided
2. List every action item with owner and deadline
3. Flag any open questions that didn't get resolved</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>

<details class="acc">
  <summary><span>Building a session-notes template</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Use the docx skill. Create a structured template for documenting a 1-hour college counseling session at Prepory. Fields: student background, current college list status, session focus, feedback given, action items for the student, action items for the counselor, notes for next session. Scannable, a coach should be able to fill it in within 10 minutes after a session.</pre><button class="copy-btn">Copy</button></div></div>
  </div>
</details>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span>Process documentation is one of the highest-leverage Claude tasks at Prepory. A SOP you write once can be followed by anyone. Thirty minutes documenting a process now saves hundreds of hours re-explaining it later.</span></div>
`},
