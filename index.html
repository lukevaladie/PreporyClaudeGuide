{id:"essays",label:"Admissions Essays",group:"Specific Workflows",emoji:"✍️",html:`
<div class="chapter-cover workflows">
  <div class="chapter-label"><span class="chapter-num">Part 04</span> Specific Workflows</div>
  <h2 class="chapter-title">Admissions-specific playbooks for recurring Prepory work.</h2>
  <p class="chapter-desc">Now we get role-specific. Each of these workflows is built on the Essentials and Core Skills chapters, if something here feels unclear, chances are the answer is in an earlier section.</p>
  <div class="chapter-meta">
    <span class="chapter-chip">✍️ Essays</span>
    <span class="chapter-chip">🏫 School Research</span>
    <span class="chapter-chip">👤 Profiles & Lists</span>
    <span class="chapter-chip">📊 Presentations</span>
  </div>
</div>
<div class="warn-banner">
  <div class="warn-banner-title">⚠️ The one rule that overrides everything else in this section</div>
  <p style="margin:0;color:var(--red-txt);font-size:14px;line-height:1.65">A student's voice is the most important thing in their application. Claude is never a ghostwriter here. It brainstorms angles and gives structural feedback. The student does all the actual writing. If you ever find yourself about to paste Claude-written prose into a student's essay document, stop. That's not what any of this is for.</p>
</div>

<details class="acc" open>
  <summary><span>Brainstorming essay topics with a student</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> A student can't figure out what to write about, or keeps defaulting to a topic that feels too broad or clichéd.</p>
    <p><strong>Best setup:</strong> A student Project in Claude. It'll already have her activity list, past sessions, and background loaded, so you don't need to re-explain.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Based on everything in this project about Priya, suggest 5 different essay angles she could explore for her Common App personal statement. Focus on angles that would feel specific and fresh, not clichés. For each angle, write one sentence on what the essay might explore and why it could be compelling for a mechanical engineering applicant to schools like Georgia Tech and Purdue.</pre><button class="copy-btn">Copy</button></div></div>
    <p>When something clicks, go deeper in the same conversation:</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Priya responded to the angle about explaining engineering to her parents. What are 4-5 specific scenes, moments, or details from her life (based on what's in this project) that could make this essay concrete and vivid rather than abstract?</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-note"><span class="callout-icon">📌</span><span>Pull exemplars from the <a href="${L.exemplars}" target="_blank" rel="noopener" class="ext-link">Exemplars Directory</a> into the project. Seeing real examples alongside Claude's suggestions gives the conversation a concrete anchor.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Decoding what a supplemental prompt is really asking</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> A school has a tricky or multi-part prompt and the student isn't sure what the committee actually wants.</p>
    <p><strong>Best setup:</strong> The school-specific Project (for example, the Stanford Coach Project). It already has the Insider Brief + exemplars, no paste, no context-setting.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Here's Stanford's "What matters most to you, and why?" prompt. Using the Stanford Insider Brief and exemplars in this project:

1. Break down what this prompt is really asking. What is Stanford's committee hoping to learn?
2. What are the 3 most common ways students miss the mark on this one?
3. What would make a response genuinely stand out vs. blend in?
4. Given the Insider Brief, what does Stanford value here that a student wouldn't know from just reading the question?</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-tip"><span class="callout-icon">💡</span><span>This is exactly the kind of two-step analysis (public prompt + insider intel) that school-specific Projects are designed for. Without the project, you'd have to paste the brief every time. With the project, it's baked in.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Giving structured feedback on a draft</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> A student submitted a draft and you want a structured first-pass analysis before adding your own coaching comments.</p>
    <p><strong>Best setup:</strong> Student project, or Cowork pointed at the student's folder so Claude can compare to exemplars and past drafts.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Review this student's Common App personal statement (latest draft in this folder) and analyze for:

1. Clarity of the central narrative, is there a clear, specific story?
2. Specificity, does it show or just tell? Flag vague passages.
3. Voice, does this sound like a real person, or generic?
4. Growth and self-awareness, does the student show reflection?
5. Prompt alignment, does it actually answer what was asked?

Constructive, actionable feedback. Quote specific passages when flagging issues.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-warn"><span class="callout-icon">⚠️</span><span><strong>Never send Claude's feedback directly to a student.</strong> Review, add your own expertise, personalize. Claude is the structural first pass. Your coaching is the layer on top.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Mechanical copy-editing pass</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> The essay is solid content-wise but needs a clean read for grammar, flow, and wordiness before final submission.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Do a mechanical copy-editing pass on this essay. For each issue: quote the exact sentence, identify the problem (grammar error / awkward phrasing / unnecessary wordiness / repeated word), and suggest a cleaner alternative. Present as a numbered list so the student can review each suggestion individually.

Do NOT rewrite whole paragraphs. Flag specific sentences only. Essay: [paste]</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-warn"><span class="callout-icon">⚠️</span><span>Present suggestions as a list for the student to review. They (or you in suggesting mode) should apply each change manually, the student owns the final text.</span></div>
  </div>
</details>
`},

{id:"schoolresearch",label:"School Research",group:"Specific Workflows",emoji:"🏫",html:`
<p>Whether you need a quick school overview, a comparison for a student weighing offers, or scholarship research for a specific profile, Claude can meaningfully cut your research time. Just verify specific numbers against official sources before sharing with families.</p>

<div class="callout callout-tip"><span class="callout-icon">💡</span><span><strong>The single biggest upgrade to school research at Prepory is using school-specific Projects.</strong> The Stanford project (and the ones that follow) will have the Insider Brief, exemplars, and common strategies already loaded, so every answer reflects real coaching intel, not just public information.</span></div>

<details class="acc" open>
  <summary><span>Quick school overview before a session</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> You have a coaching session in an hour with a student interested in a school you're less familiar with.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I have a coaching session in an hour with a student interested in Tulane as a target school. She wants to study public health and is drawn to New Orleans culture and community engagement.

Give me a concise coaching brief on Tulane: academic strengths in public health, what makes the culture distinctive, notable experiential learning or community engagement opportunities, and what their admissions committee tends to value. Keep it to things I'd actually use in conversation. Flag anything I should verify.</pre><button class="copy-btn">Copy</button></div></div>
    <p>For a school we don't have a Project for yet, add depth by uploading the Insider Brief and Common Data Set into a new conversation or ad-hoc project.</p>
    <div class="callout callout-warn"><span class="callout-icon">⚠️</span><span>Verify acceptance rates, score ranges, and financial aid deadlines directly on the school's website before sharing with families. These change every cycle.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Comparing schools for a decision</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> A student received multiple acceptances, or is building a list and trying to differentiate between similar schools.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">A Prepory student interested in communications and media studies is comparing Boston University, American University, and Syracuse. She cares most about: (1) strength of the communications program and faculty access, (2) internship and industry connections, (3) campus social life and sense of community.

Compare these three across those dimensions. Flag anything distinctly different about each one, not just brochure language.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-tip"><span class="callout-icon">💡</span><span>Drop the <a href="${L.briefs}" target="_blank" rel="noopener" class="ext-link">Insider Briefs</a> for each school into the conversation. You'll get a comparison that reflects real coaching intel, not just public sites.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Scholarship and financial aid research</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> You need to help a student identify merit scholarship options, or a parent is asking about affordability.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Find merit-based scholarship opportunities for a student with this profile: first-gen college student from Georgia, 3.9 GPA, 1490 SAT, interested in pre-law, identifies as Latina. Applying to schools in the Southeast and mid-Atlantic.

For each scholarship: award amount, key eligibility criteria, deadline, direct application link if available. Prioritize scholarships she could realistically compete for, not only the most prestigious. Flag anywhere I should verify deadlines or criteria.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-warn"><span class="callout-icon">⚠️</span><span><strong>Always verify scholarship details on the official source before sharing.</strong> Deadlines and eligibility change. Claude's output is a starting list, not a definitive resource.</span></div>
  </div>
</details>
`},

/* SEC_PROFILES */
{id:"profiles",label:"Student Profiles & Lists",group:"Specific Workflows",emoji:"👤",html:`
<p>The essay isn't the only part of the application. The activity list, resume, and overall narrative connecting everything matter just as much. Claude can help sharpen and structure all of it, especially when working inside a student Project or Cowork session pointed at their folder.</p>

<details class="acc" open>
  <summary><span>Writing activity list descriptions</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> A student needs to describe extracurriculars within tight character limits (Common App: 150 characters per activity).</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Help me write a 150-character-or-fewer Common App activity description. Action-oriented, specific, and strong, no filler phrases like "helped with" or "participated in." Give me 5 options.

Activity: Student co-founded a nonprofit providing free SAT prep to low-income high schoolers in Atlanta. Personally tutored 23 students, coordinated 4 volunteer tutors, raised $3,200 for materials.</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-tip"><span class="callout-icon">💡</span><span>The best descriptions are hyper-specific. "Tutored 23 students, raised $3,200, led 4 volunteers" is 10x stronger than "founded nonprofit to help underprivileged students." Push Claude for specificity if the first pass is vague.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Identifying the narrative thread across a student's profile</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <p><strong>When to use:</strong> You're trying to figure out the big-picture story the student's application tells, the thread connecting activities, essays, and background into something coherent.</p>
    <p><strong>Best setup:</strong> A student Project. Claude reasons across all of Maya's files at once, grounded in her actual profile rather than guessing.</p>
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Based on everything in this project (Maya's activities, essays, background, and our session notes), what are the 3 strongest narrative threads connecting her profile? For each:
- Which parts of her application support it
- Why an admissions committee would find it distinctive
- Where it could be stronger

Also: are there any aspects of her profile that feel disconnected from the main narrative?</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-tip"><span class="callout-icon">💡</span><span>Use this as a brainstorming aid, not a strategy generator. The best themes always emerge from real conversation with the student. Use Claude to surface patterns you might have missed, then validate them directly.</span></div>
  </div>
</details>

<details class="acc">
  <summary><span>Resume and CV drafting (grad and professional programs)</span><span class="acc-chev">▼</span></summary>
  <div class="acc-body">
    <div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Restructure this resume for a student applying to Georgetown's Master of Science in Foreign Service (MSFS). She wants to highlight international experience, policy research, and leadership in student orgs.

Make every bullet action-oriented and specific. Cut vague language like "assisted with" or "was involved in." Where she has quantifiable impact (people, budget, scale), flag where she should add that data.

Current resume: [paste]</pre><button class="copy-btn">Copy</button></div></div>
    <div class="callout callout-warn"><span class="callout-icon">⚠️</span><span>Claude inflates language. Review every bullet. "Spearheaded a cross-functional initiative" only belongs if that's actually what happened. The final resume must accurately represent real experience.</span></div>
  </div>
</details>
`},

/* SEC_PRESENTATIONS */
{id:"presentations",label:"Presentations & Decks",group:"Specific Workflows",emoji:"📊",html:`
<p>Claude can meaningfully speed up presentation work: planning structure, drafting slide content, and writing speaker notes. In Cowork with the <strong>pptx skill</strong>, Claude can produce a real PowerPoint file directly into your folder, not just slide text you have to paste somewhere.</p>

<div class="callout callout-info"><span class="callout-icon">ℹ️</span><span><strong>The ideal workflow:</strong> Plan structure in Chat → build the real deck in Cowork using the pptx skill → apply Prepory branding manually. Claude handles words and structure; you handle visual polish.</span></div>

<div class="sh">Step 1: Plan the deck in Chat</div>
<p>Before building anything, figure out what you're saying. Chat is better for back-and-forth planning than working directly in a deck.</p>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">I'm building a 45-minute Prepory webinar called "The College Application Timeline: When to Start, What to Do, and How to Stay Sane." Audience: parents of high school sophomores and juniors, most feeling overwhelmed.

Give me a slide-by-slide outline for a 15-slide deck. For each slide: title, 3-4 bullet points of content, and a note on the best visual or data point. Tone: reassuring and clear, not panic-inducing.</pre><button class="copy-btn">Copy</button></div></div>
<p>Iterate until the structure is right. "The first five slides are all background, move the actionable advice earlier." Claude will restructure.</p>

<div class="sh">Step 2: Build the deck in Cowork</div>
<p>Once your outline is solid, switch to Cowork with your pptx skill and a folder selected:</p>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Use the pptx skill. Build the 15-slide "College Application Timeline" deck based on the outline I just created (paste it here). Include speaker notes for each slide, 3-4 sentences per slide, conversational, like the presenter is talking to parents in a room. Save as "Timeline-Webinar-Draft.pptx" in this folder.</pre><button class="copy-btn">Copy</button></div></div>
<p>Claude produces a real PowerPoint file. Open it, apply Prepory branding (colors, fonts, logo), and adjust anything that needs a human touch.</p>

<div class="sh">Step 3: Refine slide by slide</div>
<div class="prompt-wrap"><div class="prompt-label">If one slide needs help</div><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Slide 7 is too dense. Rewrite the bullets so they're 4 tight lines max, each starting with an action verb. Keep the same core message but make it scannable from the back of a room.</pre><button class="copy-btn">Copy</button></div></div>

<div class="sh">One-pagers and leave-behinds</div>
<p>For handouts at fairs, consultations, or internal training, use Cowork with the docx skill:</p>
<div class="prompt-wrap"><div class="prompt"><div class="prompt-rail"></div><pre class="prompt-text">Use the docx skill. Draft a one-page handout about Prepory's college counseling program for high school guidance counselors who might refer students to us.

They care about: how we complement their work, track record, ease of getting started.

Include:
- 2-sentence description of Prepory
- 3-4 things we provide that a school counselor typically can't
- Headline stat: students are 3.38x more likely to be admitted to a school with a sub-15% acceptance rate
- Clear next step: how to refer a student

Scannable with short sections. Someone should get the gist in 30 seconds.</pre><button class="copy-btn">Copy</button></div></div>

<div class="callout callout-warn"><span class="callout-icon">⚠️</span><span>Review every stat on every slide. Claude sometimes inserts plausible-sounding numbers that aren't accurate. Replace any figure you didn't provide with verified Prepory data before presenting.</span></div>
`},
];

function initApp(){
  const mainInner = document.getElementById('main-inner');
  const drawerNav = document.getElementById('drawer-nav');

  // Render sections
  SECTIONS.forEach((s,i)=>{
    const sec = document.createElement('section');
    sec.className = 'section' + (i===0?' active':'');
    sec.id = 'sec-'+s.id;
    sec.innerHTML = s.html;
    mainInner.appendChild(sec);
  });

  // Render drawer
  const uniqueGroups = [...new Set(SECTIONS.map(s=>s.group))];
  const groupMeta = {
    'Start Here':{cls:'start',num:'01',hint:''},
    'Claude Essentials':{cls:'essentials',num:'02',hint:'The features. Cowork, Chat, Skills, Connectors, Projects, and usage limits.'},
    'Core Skills':{cls:'skills',num:'03',hint:'Five things Claude is great at, regardless of role.'},
    'Specific Workflows':{cls:'workflows',num:'04',hint:'Admissions-specific playbooks. Best after Core Skills.'}
  };
  uniqueGroups.forEach(g=>{
    const meta = groupMeta[g]||{cls:'',num:'',hint:''};
    const wrap = document.createElement('div');
    wrap.className = 'drawer-group '+meta.cls;
    let inner = `<div class="drawer-group-label"><span class="dg-num">Part ${meta.num}</span> ${g}</div>`;
    if(meta.hint) inner += `<div class="drawer-group-hint">${meta.hint}</div>`;
    wrap.innerHTML = inner;
    SECTIONS.forEach((s,i)=>{
      if(s.group!==g) return;
      const btn = document.createElement('button');
      btn.className='drawer-item';
      btn.dataset.index = i;
      btn.innerHTML = `
        <span class="drawer-item-emoji">${s.emoji}</span>
        <span class="drawer-item-label">${s.label}</span>
        ${s.highlight?'<span class="drawer-star">★</span>':''}
      `;
      btn.addEventListener('click',()=>go(i));
      wrap.appendChild(btn);
    });
    drawerNav.appendChild(wrap);
  });

  // Add footer nav to each section
  document.querySelectorAll('.section').forEach((sec,i)=>{
    const prev = SECTIONS[i-1];
    const next = SECTIONS[i+1];
    const nav = document.createElement('div');
    nav.className='footer-nav';
    nav.innerHTML = `
      ${prev?`<button class="btn-prev" data-nav="${i-1}">← ${prev.label}</button>`:'<div></div>'}
      <span class="progress-text">${i+1} / ${SECTIONS.length}</span>
      ${next?`<button class="btn-next" data-nav="${i+1}">Next: ${next.emoji} ${next.label} →</button>`:'<div class="complete-badge">🎉 Guide complete!</div>'}
    `;
    sec.appendChild(nav);
  });

  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.addEventListener('click',e=>go(parseInt(e.currentTarget.dataset.nav)));
  });

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const text = btn.dataset.text || btn.parentElement.querySelector('.prompt-text').innerText;
      try{
        if(navigator.clipboard&&navigator.clipboard.writeText){
          await navigator.clipboard.writeText(text);
        }else{
          const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
          document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        }
        btn.classList.add('ok');const old=btn.innerText;btn.innerText='✓ Copied';
        setTimeout(()=>{btn.classList.remove('ok');btn.innerText=old;},1800);
      }catch(e){console.warn(e)}
    });
  });

  // Drawer toggles
  const btn=document.getElementById('contents-btn');
  const drawer=document.getElementById('drawer');
  const overlay=document.getElementById('overlay');
  const closeBtn=document.getElementById('drawer-close');
  const openDrawer=()=>{drawer.classList.add('open');overlay.classList.add('open');};
  const closeDrawer=()=>{drawer.classList.remove('open');overlay.classList.remove('open');};
  btn.addEventListener('click',openDrawer);
  closeBtn.addEventListener('click',closeDrawer);
  overlay.addEventListener('click',closeDrawer);

  go(0,true);
}

function go(i,skipScroll){
  document.querySelectorAll('.section').forEach((s,idx)=>s.classList.toggle('active',idx===i));
  const cur = SECTIONS[i];
  document.getElementById('bc-group').innerText = cur.group;
  document.getElementById('bc-current').innerText = cur.emoji+' '+cur.label;
  document.getElementById('bc-pill').style.display = cur.highlight?'inline-block':'none';
  const pct = Math.round(((i+1)/SECTIONS.length)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('drawer-prog-fill').style.width = pct+'%';
  document.getElementById('drawer-prog-text').innerText = (i+1)+' of '+SECTIONS.length;
  document.querySelectorAll('.drawer-item').forEach(b=>{
    const act = parseInt(b.dataset.index)===i;
    b.classList.toggle('active',act);
    const dot = b.querySelector('.drawer-active-dot');
    if(act&&!dot){
      const d=document.createElement('span');d.className='drawer-active-dot';b.appendChild(d);
    }else if(!act&&dot){dot.remove();}
  });
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  if(!skipScroll) document.getElementById('main').scrollTo({top:0,behavior:'instant'});
}

// Boot
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initApp);
}else{
  initApp();
}
</script>
</body>
</html>
