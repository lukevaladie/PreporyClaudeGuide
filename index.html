<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Using Claude at Prepory. Team Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0B473B;
  --primary-dk:#083329;
  --primary-lt:#e8f1ee;
  --primary-soft:#f3f8f6;
  --accent:#25D36B;
  --accent-dk:#1ab057;
  --accent-lt:#e9fbf1;
  --accent-glow:rgba(37,211,107,0.22);
  --ink:#0a1f1a;
  --ink-2:#1d332c;
  --ink-3:#3a524a;
  --muted:#6b7f78;
  --muted-2:#94a59f;
  --line:#e3ebe7;
  --line-2:#ced8d3;
  --bg:#fafbf9;
  --bg-2:#f3f6f3;
  --card:#ffffff;
  --amber:#fef3c7;
  --amber-bd:#fde68a;
  --amber-txt:#78350f;
  --red:#fef2f2;
  --red-bd:#fecaca;
  --red-txt:#991b1b;
  --sky:#eff8ff;
  --sky-bd:#bfdbfe;
  --sky-txt:#0c4a6e;
  --violet:#f5f3ff;
  --violet-bd:#ddd6fe;
  --violet-txt:#5b21b6;
  --shadow-sm:0 1px 3px rgba(11,71,59,.05);
  --shadow-md:0 4px 16px rgba(11,71,59,.07);
  --shadow-lg:0 12px 40px rgba(11,71,59,.10);
  --radius:14px;
  --radius-lg:20px;
}

*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{margin:0;padding:0}
body{
  font-family:'Montserrat',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  overflow:hidden;
  height:100vh;
  letter-spacing:-.005em;
}
a{color:var(--primary);text-decoration:none;font-weight:500;border-bottom:1px solid transparent;transition:all .15s}
a:hover{color:var(--accent-dk);border-bottom-color:var(--accent)}
p{margin:10px 0;color:var(--ink-2);font-size:15px;line-height:1.75}
ul{margin:10px 0;padding-left:22px}
li{margin:6px 0;color:var(--ink-2);line-height:1.75;font-size:15px}
strong{color:var(--ink);font-weight:600}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ═══════════════════ LAYOUT ═══════════════════ */
.app{height:100vh;display:flex;flex-direction:column}

.topbar{
  background:rgba(255,255,255,0.85);
  backdrop-filter:saturate(180%) blur(16px);
  -webkit-backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  position:relative;
  z-index:50;
}
.topbar-inner{
  max-width:1040px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:64px;gap:16px;
}
.brand{
  display:flex;align-items:center;gap:10px;font-weight:700;color:var(--primary);font-size:14px;letter-spacing:-.2px;
}
.brand-mark{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:13px;
  box-shadow:0 2px 8px rgba(11,71,59,.25);
}
.breadcrumb{display:flex;align-items:center;gap:10px;font-size:13px;min-width:0;flex:1;margin:0 20px}
.breadcrumb-group{color:var(--muted);white-space:nowrap;flex-shrink:0}
.breadcrumb-sep{color:var(--line-2);font-size:11px}
.breadcrumb-current{font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill-highlight{
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  color:var(--amber-txt);
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;
  letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.contents-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:10px;
  border:1px solid var(--line);background:white;color:var(--ink-2);
  font-size:13px;font-weight:600;
  box-shadow:var(--shadow-sm);
  transition:all .2s;
}
.contents-btn:hover{border-color:var(--accent);color:var(--primary);box-shadow:var(--shadow-md)}
.contents-btn .dots{display:flex;flex-direction:column;gap:3px}
.contents-btn .dots span{width:14px;height:2px;background:currentColor;border-radius:1px;display:block}

.progress-track{height:3px;background:var(--line);overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .5s cubic-bezier(.4,0,.2,1)}

.main{flex:1;overflow-y:auto;padding:0 28px 120px;scroll-behavior:smooth}
.main-inner{max-width:760px;margin:0 auto;padding-top:48px}

/* ═══════════════════ TYPE ═══════════════════ */
.sh{
  font-size:11.5px;font-weight:700;color:var(--primary);
  margin:36px 0 14px;letter-spacing:1.4px;text-transform:uppercase;
  display:flex;align-items:center;gap:12px;
}
.sh::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--accent) 0,transparent 100%)}
h1.display{
  font-family:'Montserrat',sans-serif;
  font-size:44px;font-weight:800;line-height:1.08;letter-spacing:-1.6px;
  margin:0 0 18px;color:white;
}
h2.display{
  font-family:'Montserrat',sans-serif;
  font-size:30px;font-weight:800;line-height:1.15;letter-spacing:-.9px;margin:0 0 12px;
}
h3.subhead{font-size:18px;font-weight:700;margin:24px 0 10px;color:var(--ink);letter-spacing:-.2px}

/* ═══════════════════ HERO ═══════════════════ */
.hero{
  position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 15% 20%,rgba(37,211,107,.18),transparent 55%),
    radial-gradient(circle at 85% 80%,rgba(37,211,107,.10),transparent 50%),
    linear-gradient(135deg,var(--primary-dk) 0%,var(--primary) 100%);
  border-radius:var(--radius-lg);
  padding:56px 48px;
  margin-bottom:36px;
  color:white;
  box-shadow:var(--shadow-lg);
}
.hero::before{
  content:"";position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.03) 1px,transparent 1px),
    radial-gradient(circle at 70% 70%,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:40px 40px,60px 60px;
  opacity:.6;pointer-events:none;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(37,211,107,.15);
  border:1px solid rgba(37,211,107,.3);
  border-radius:999px;padding:5px 14px;
  font-size:10.5px;font-weight:700;letter-spacing:1.4px;
  color:var(--accent);text-transform:uppercase;margin-bottom:22px;position:relative;
}
.hero-eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.hero p{font-size:17px;line-height:1.65;opacity:.78;max-width:540px;margin:0;position:relative;color:rgba(255,255,255,.88)}

/* ═══════════════════ CARDS ═══════════════════ */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px 24px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  transition:all .25s;
}
.card:hover{border-color:var(--line-2);box-shadow:var(--shadow-md)}

.tool-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px 24px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  transition:all .25s;
  position:relative;
  overflow:hidden;
}
.tool-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--primary),var(--accent));
  opacity:0;transition:opacity .25s;
}
.tool-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.tool-card:hover::before{opacity:1}
.tool-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.tool-name{font-weight:700;font-size:16px;color:var(--ink);letter-spacing:-.2px}
.tool-where{
  background:var(--primary-soft);color:var(--primary);
  font-size:10.5px;font-weight:600;padding:4px 11px;border-radius:999px;
  flex-shrink:0;white-space:nowrap;letter-spacing:.3px;
}
.tool-how{
  background:linear-gradient(135deg,var(--accent-lt),#dcfce7);
  border:1px solid #bbf7d0;
  border-radius:10px;padding:12px 14px;margin-top:12px;
  font-size:13.5px;color:var(--primary-dk);line-height:1.65;
}

.resource-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow-sm);transition:all .2s;
}
.resource-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md)}
.resource-title{font-weight:700;color:var(--ink);margin-bottom:4px;font-size:14.5px}
.resource-desc{font-size:13.5px;color:var(--ink-3);line-height:1.65}

/* ═══════════════════ CALLOUTS ═══════════════════ */
.callout{
  display:flex;gap:14px;align-items:flex-start;
  border-radius:var(--radius);
  padding:14px 18px;margin:18px 0;
  font-size:14px;line-height:1.7;
  border:1px solid;
  box-shadow:var(--shadow-sm);
}
.callout-icon{flex-shrink:0;font-size:16px;margin-top:1px}
.callout-tip{background:linear-gradient(135deg,var(--accent-lt),#dcfce7);border-color:#a7f3d0;color:var(--primary-dk)}
.callout-warn{background:linear-gradient(135deg,var(--red),#fee2e2);border-color:var(--red-bd);color:var(--red-txt)}
.callout-note{background:linear-gradient(135deg,var(--amber),#fef3c7);border-color:var(--amber-bd);color:var(--amber-txt)}
.callout-info{background:linear-gradient(135deg,var(--sky),#dbeafe);border-color:var(--sky-bd);color:var(--sky-txt)}
.callout-link{background:linear-gradient(135deg,var(--violet),#ede9fe);border-color:var(--violet-bd);color:var(--violet-txt)}

/* ═══════════════════ PROMPT BLOCK ═══════════════════ */
.prompt-wrap{margin:16px 0}
.prompt-label{
  font-size:10.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.prompt{
  background:linear-gradient(135deg,#0a2520 0%,#0f3c32 100%);
  border:1px solid rgba(37,211,107,.2);
  border-radius:var(--radius);
  padding:18px 20px;
  box-shadow:0 4px 16px rgba(10,37,32,.2);
  display:flex;gap:14px;align-items:flex-start;
  position:relative;
}
.prompt-rail{
  width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;
  background:linear-gradient(180deg,var(--accent),var(--accent-dk));
  box-shadow:0 0 10px var(--accent-glow);
}
.prompt-text{
  flex:1;white-space:pre-wrap;
  font-family:'JetBrains Mono','Fira Code',monospace;
  font-size:12.5px;line-height:1.75;color:#a5e9c4;
  margin:0;word-break:break-word;
}
.copy-btn{
  padding:6px 12px;border-radius:8px;border:none;
  background:rgba(255,255,255,.06);color:#a5e9c4;
  font-size:10.5px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;cursor:pointer;flex-shrink:0;
  transition:all .2s;backdrop-filter:blur(4px);
  font-family:'Montserrat',sans-serif;
}
.copy-btn:hover{background:rgba(255,255,255,.12);color:#d1f7e2}
.copy-btn.ok{background:rgba(37,211,107,.25);color:#6ee7a7}

/* ═══════════════════ GOOD / BAD ═══════════════════ */
.good,.bad{
  border-radius:10px;padding:11px 15px;margin:8px 0;
  font-size:13.5px;font-family:'JetBrains Mono',monospace;
  line-height:1.6;box-shadow:var(--shadow-sm);
}
.good{background:linear-gradient(135deg,var(--accent-lt),#dcfce7);color:var(--primary-dk);border-left:3px solid var(--accent)}
.bad{background:linear-gradient(135deg,var(--red),#fee2e2);color:var(--red-txt);border-left:3px solid #fca5a5}

/* ═══════════════════ ACCORDION ═══════════════════ */
.acc{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:all .25s;
}
.acc[open]{border-color:rgba(11,71,59,.25);box-shadow:var(--shadow-md)}
.acc summary{
  list-style:none;cursor:pointer;
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.45;
  transition:background .2s;
}
.acc summary::-webkit-details-marker{display:none}
.acc[open] summary{background:var(--primary-soft)}
.acc summary:hover{background:var(--bg-2)}
.acc-chev{
  width:26px;height:26px;border-radius:8px;
  background:rgba(11,71,59,.06);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .25s;
  font-size:10px;color:var(--muted);
}
.acc[open] .acc-chev{background:rgba(37,211,107,.18);color:var(--primary);transform:rotate(180deg)}
.acc-body{padding:4px 20px 22px;color:var(--ink-2);font-size:14px;line-height:1.75}

/* ═══════════════════ STEPS ═══════════════════ */
.steps{position:relative;margin:20px 0;padding-left:0}
.steps::before{
  content:"";position:absolute;left:14px;top:18px;bottom:18px;
  width:2px;background:linear-gradient(180deg,var(--accent),transparent);
  border-radius:1px;
}
.step{display:flex;gap:16px;margin-bottom:16px;position:relative}
.step-num{
  width:28px;height:28px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(11,71,59,.25);
  margin-top:1px;
}
.step-text{flex:1;font-size:14px;line-height:1.75;color:var(--ink-2);padding-top:3px}

/* ═══════════════════ NAV BUTTONS ═══════════════════ */
.footer-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:64px;padding-top:28px;
  border-top:2px solid var(--accent-lt);gap:14px;
}
.btn-prev,.btn-next{
  display:inline-flex;align-items:center;gap:10px;
  padding:12px 20px;border-radius:12px;
  font-size:13px;font-weight:600;
  border:none;transition:all .2s;
}
.btn-prev{background:white;color:var(--ink-3);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.btn-prev:hover{border-color:var(--accent);color:var(--primary);box-shadow:var(--shadow-md)}
.btn-next{
  background:linear-gradient(135deg,var(--primary),var(--accent-dk));
  color:white;
  box-shadow:0 6px 18px rgba(11,71,59,.25);
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(11,71,59,.3)}
.progress-text{font-size:11.5px;color:var(--muted);font-weight:500;flex-shrink:0}
.complete-badge{font-size:15px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px}

/* ═══════════════════ DRAWER ═══════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(10,31,26,.55);
  backdrop-filter:blur(4px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:320px;max-width:88vw;
  background:white;z-index:201;
  overflow-y:auto;
  box-shadow:-16px 0 40px rgba(10,31,26,.15);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 24px 18px;border-bottom:1px solid var(--line);z-index:2;
}
.drawer-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;color:var(--ink);letter-spacing:-.4px}
.drawer-close{
  background:rgba(11,71,59,.06);border:none;border-radius:8px;
  width:32px;height:32px;font-size:15px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.drawer-close:hover{background:rgba(11,71,59,.12);color:var(--ink)}
.drawer-progress{padding:14px 24px 18px;border-bottom:1px solid var(--line)}
.drawer-prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500}
.drawer-prog-bar{height:4px;background:var(--line);border-radius:4px;overflow:hidden}
.drawer-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.drawer-group{padding:18px 24px 6px}
.drawer-group-label{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dg-num{background:var(--primary);color:white;padding:2px 8px;border-radius:999px;font-size:9.5px;letter-spacing:1px;font-weight:800;flex-shrink:0}
.drawer-group.essentials .dg-num{background:linear-gradient(135deg,var(--primary),var(--accent-dk))}
.drawer-group.skills .dg-num{background:linear-gradient(135deg,var(--primary),#105244)}
.drawer-group.workflows .dg-num{background:linear-gradient(135deg,var(--primary-dk),var(--primary))}
.drawer-group-hint{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;background:var(--bg-2);border-radius:10px;padding:9px 12px;border:1px solid var(--line)}
.drawer-item{
  width:100%;text-align:left;padding:10px 14px;border-radius:10px;
  background:transparent;color:var(--ink-3);border:1px solid transparent;
  font-size:13.5px;font-weight:500;margin-bottom:4px;
  display:flex;align-items:center;gap:12px;transition:all .2s;
}
.drawer-item:hover{background:var(--bg-2);color:var(--ink)}
.drawer-item.active{
  background:linear-gradient(135deg,var(--accent-lt),#dcfce7);
  border-color:rgba(37,211,107,.3);
  color:var(--primary-dk);font-weight:700;
}
.drawer-item-emoji{width:22px;text-align:center;flex-shrink:0;font-size:15px}
.drawer-item-label{flex:1;line-height:1.4}
.drawer-star{
  font-size:9.5px;background:linear-gradient(135deg,#fef3c7,#fde68a);
  color:var(--amber-txt);padding:2px 8px;border-radius:999px;font-weight:700;
}
.drawer-active-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  box-shadow:0 0 8px var(--accent-glow);
}

/* ═══════════════════ UTILITIES ═══════════════════ */
.grid-cards{display:grid;gap:10px;margin:18px 0}
.section{display:none;animation:fadeIn .3s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.use-case-card{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:14px 18px;box-shadow:var(--shadow-sm);transition:all .2s;
}
.use-case-card:hover{border-color:var(--line-2)}
.use-case-task{color:var(--muted);font-size:12.5px;margin-bottom:5px}
.use-case-task strong{color:var(--ink);font-weight:600}
.use-case-tool{color:var(--primary);font-weight:600;font-size:14px}

.feature-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-soft);color:var(--primary);
  font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;
  margin:3px 4px 3px 0;border:1px solid rgba(11,71,59,.1);
}

.warn-banner{
  background:linear-gradient(135deg,var(--red),#fee2e2);
  border:1px solid var(--red-bd);
  border-radius:var(--radius);
  padding:18px 22px;margin-bottom:22px;
}

/* ═══════════════════ CHAPTER COVER ═══════════════════ */
.chapter-cover{
  position:relative;overflow:hidden;
  border-radius:var(--radius-lg);
  padding:38px 40px 34px;
  margin-bottom:36px;
  color:white;
  box-shadow:var(--shadow-lg);
}
.chapter-cover::before{
